# Firepower Threat Defense Configuration
# FTD managed by FDM (Firepower Device Manager)
# Exported via: system support diagnostic-cli -> enable -> show running-config
NGFW Version 7.2.7

hostname FTD-HQ-FW01
domain-name corp.example.com
names
!
! ---------------------------------------------------------------
! Interfaces
! ---------------------------------------------------------------
interface GigabitEthernet0/0
 nameif outside
 security-level 0
 ip address 203.0.113.10 255.255.255.248
!
interface GigabitEthernet0/1
 nameif inside
 security-level 100
 ip address 10.10.0.1 255.255.255.0
!
interface GigabitEthernet0/2
 nameif dmz
 security-level 50
 ip address 192.168.100.1 255.255.255.0
!
interface Management0/0
 management-only
 nameif management
 security-level 100
 ip address 10.0.0.254 255.255.255.0
!
! ---------------------------------------------------------------
! Object Groups
! ---------------------------------------------------------------
object network obj_any
 subnet 0.0.0.0 0.0.0.0
!
object network INSIDE_NET
 subnet 10.10.0.0 255.255.255.0
!
object network DMZ_NET
 subnet 192.168.100.0 255.255.255.0
!
! ---------------------------------------------------------------
! Access Control (LINA ACL — Snort/FMC policy not visible here)
! NOTE: rule-id values are assigned by FMC/FDM; any4 = any IPv4
! ---------------------------------------------------------------
access-list NGFW_ONBOX_ACL advanced permit ip 10.10.0.0 255.255.255.0 any4 rule-id 268435456 event-log both
access-list NGFW_ONBOX_ACL advanced permit ip 192.168.100.0 255.255.255.0 any4 rule-id 268435457 event-log flow-start
access-list NGFW_ONBOX_ACL advanced deny ip any4 any4 rule-id 268435458 event-log both
access-group NGFW_ONBOX_ACL global
!
! ---------------------------------------------------------------
! NAT
! ---------------------------------------------------------------
nat (inside,outside) source dynamic obj_any interface
!
! ---------------------------------------------------------------
! Routing
! ---------------------------------------------------------------
route outside 0.0.0.0 0.0.0.0 203.0.113.1 1
!
! ---------------------------------------------------------------
! SSH — restricted to management subnet only; version 2
! ---------------------------------------------------------------
ssh version 2
ssh 10.0.0.0 255.255.255.0 management
ssh timeout 5
ssh key-exchange group dh-group14-sha256
!
! ---------------------------------------------------------------
! HTTP (FDM web UI — uses HTTPS on port 443, not plain HTTP)
! ---------------------------------------------------------------
http server enable
http 10.0.0.0 255.255.255.0 management
!
! ---------------------------------------------------------------
! AAA — SSH authenticated via TACACS+, fallback to LOCAL
! ---------------------------------------------------------------
aaa authentication ssh console TACACS_GRP LOCAL
aaa authentication http console TACACS_GRP LOCAL
!
aaa-server TACACS_GRP protocol tacacs+
aaa-server TACACS_GRP (management) host 10.0.0.100
 key TacacsSecret1
aaa-server TACACS_GRP (management) host 10.0.0.101
 key TacacsSecret1
!
! ---------------------------------------------------------------
! Logging
! ---------------------------------------------------------------
logging enable
logging timestamp
logging buffered informational
logging host management 10.0.1.100
logging host management 10.0.1.101
!
! ---------------------------------------------------------------
! SNMP — using default community string (security finding)
! ---------------------------------------------------------------
snmp-server community public ro
snmp-server host management 10.0.0.100 community public version 2c
snmp-server enable traps snmp authentication linkup linkdown
!
! ---------------------------------------------------------------
! NTP
! ---------------------------------------------------------------
ntp server 10.0.0.1 source management prefer
ntp server 10.0.0.2 source management
!
! ---------------------------------------------------------------
! Threat Detection (FTD LINA layer)
! ---------------------------------------------------------------
threat-detection basic-threat
threat-detection statistics access-list
threat-detection statistics tcp-intercept rate-interval 30 burst-rate 400 average-rate 200
!
! ---------------------------------------------------------------
! Timeouts / Connection limits
! ---------------------------------------------------------------
timeout xlate 3:00:00
timeout pat-xlate 0:00:30
timeout conn 1:00:00 half-closed 0:10:00 udp 0:02:00 sctp 0:02:00 icmp 0:00:02
timeout sunrpc 0:10:00 h323 0:05:00 h225 0:01:00 mgcp 0:05:00 mgcp-pat 0:05:00
timeout h225 1:00:00
timeout mgcp 0:05:00 mgcp-pat 0:05:00
!
! ---------------------------------------------------------------
! Service Policy (default inspection)
! ---------------------------------------------------------------
policy-map type inspect dns preset_dns_map
 parameters
  message-length maximum client auto
  message-length maximum 512
policy-map global_policy
 class inspection_default
  inspect dns preset_dns_map
  inspect ftp
  inspect h323 h225
  inspect h323 ras
  inspect ip-options
  inspect netbios
  inspect rsh
  inspect rtsp
  inspect skinny
  inspect esmtp
  inspect sqlnet
  inspect sunrpc
  inspect tftp
  inspect sip
  inspect xdmcp
service-policy global_policy global
!
end
