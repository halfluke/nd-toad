#
!Software Version V800R021C00SPC600
#
sysname VRP-NE-CORE01
#
info-center enable
info-center loghost 10.0.1.20 channel 2
info-center loghost source LoopBack0
#
super password level 3 cipher @Q%g8}#$aK!secretpassword
#
undo ip source-route
undo lldp enable
undo ftp server enable
undo web-manager enable
#
aaa
 authentication-scheme HWTACACS-AUTH
  authentication-mode hwtacacs local
 #
 accounting-scheme HWTACACS-ACCT
  accounting-mode hwtacacs
 #
 domain default
  authentication-scheme HWTACACS-AUTH
  accounting-scheme HWTACACS-ACCT
  hwtacacs-server TACACS-PRIMARY
  password min-len 14
  login-failed-times 5
 #
 local-user admin password irreversible-cipher @YkHG#mnP!wXzSecretPass
 local-user admin privilege level 3
 local-user admin service-type ssh terminal
#
hwtacacs-server TACACS-PRIMARY
 server authentication 10.0.1.10
 server authorization 10.0.1.10
 server accounting 10.0.1.10
 server shared-key cipher @TacacsSecret!
#
stelnet server enable
ssh server version 2
#
snmp-agent
snmp-agent group v3 SNMPV3GRP privacy
snmp-agent usm-user v3 snmpuser SNMPV3GRP authentication-mode sha-256 @snmpAuthKey! privacy-mode aes128 @snmpPrivKey!
snmp-agent target-host trap address udp-domain 10.0.1.25 params securityname snmpuser v3 privacy
snmp-agent sys-info contact noc@example.com
snmp-agent sys-info location DC-RACK-A
snmp-agent trap source LoopBack0
#
ntp-service authentication enable
ntp-service authentication-keyid 1 authentication-mode md5 cipher @NTPKey1
ntp-service reliable authentication-keyid 1
ntp-service unicast-server 10.0.1.30 authentication-keyid 1
ntp-service access server 2001
#
acl 2001
 rule 5 permit source 10.0.1.0 0.0.0.255
 rule 100 deny
#
interface LoopBack0
 ip address 10.255.0.1 255.255.255.255
#
interface GigabitEthernet0/0/0
 description MGMT
 ip address 10.0.1.5 255.255.255.0
#
interface XGigabitEthernet1/0/0
 description UPLINK
 ip address 192.168.1.1 255.255.255.252
#
ospf 1
 silent-interface GigabitEthernet0/0/0
 area 0.0.0.0
  authentication-mode md5 1 cipher @ospfkey1
  network 192.168.1.0 0.0.0.3
#
bgp 65001
 router-id 10.255.0.1
 peer 192.168.1.2 as-number 65000
 peer 192.168.1.2 password cipher @bgppassword
#
user-interface console 0
 authentication-mode aaa
 idle-timeout 5 0
#
user-interface vty 0 4
 authentication-mode aaa
 protocol inbound ssh
 acl 2001 inbound
 idle-timeout 10 0
#
header login information "Authorized access only."
#
ip icmp rate-limit 500
#
return
