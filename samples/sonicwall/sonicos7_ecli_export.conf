# SonicWall NSA 3700 — SonicOS 7.0.1 — E-CLI export
# Generated with: export current-config cli
#
# NOTE: This is a SYNTHETIC sample derived from the format documented in the
# official SonicWall SonicOS 6.5 Enterprise CLI Reference Guide and the
# SonicWall support KB (kA1VN0000000JfR0AU).
# The E-CLI format is produced by "export current-config cli ftp ..." and
# can be read/edited as plain text. The binary .exp format is NOT supported.
#
firmware-version SonicOS 7.0.1-R1786
hostname SONICWALL-NSA3700

#
# Address objects
#
address-object ipv4 LAN_SUBNET
  zone LAN
  network 192.168.1.0 255.255.255.0
  exit

address-object ipv4 DMZ_NET
  zone DMZ
  network 10.10.10.0 255.255.255.0
  exit

address-object ipv4 MGMT_HOST
  zone LAN
  host 192.168.1.10
  exit

address-object ipv4 SIEM_HOST
  zone LAN
  host 192.168.1.20
  exit

#
# Service objects
#
service-object HTTPS_8443
  protocol tcp
  port 8443
  exit

#
# Management plane hardening
#
no management http
management https
management ssh
management ping
management idle-timeout 10

#
# SNMP
#
snmp community-name Ops$ecure2026
snmp location "HQ-DataCenter-Rack3"
snmp contact "noc@example.com"

#
# Logging / Syslog
#
syslog server 192.168.1.20
syslog facility local0

#
# NTP
#
ntp server 192.168.1.10
ntp server 192.168.1.11

#
# Access rules
#
access-rule from LAN to WAN
  action allow
  source LAN_SUBNET
  destination any
  service any
  enabled
  exit

access-rule from WAN to LAN
  action deny
  source any
  destination any
  service any
  enabled
  log
  exit

access-rule from DMZ to WAN
  action allow
  source DMZ_NET
  destination any
  service any
  enabled
  exit

access-rule from WAN to DMZ
  action allow
  source any
  destination DMZ_NET
  service HTTPS_8443
  enabled
  log
  exit
