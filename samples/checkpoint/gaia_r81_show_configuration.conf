#
# Configuration of gaia-gw01
# Language version: 10.0v1
#
# Exported by admin on Thu May 28 09:00:00 2026 UTC
#
# NOTE: This is a SYNTHETIC sample derived from the format documented in the
# official Check Point Gaia R81.10 Administration Guide (clish "show configuration").
# It exercises the Gaia OS layer: interfaces, routing, users, SSH/SNMP/NTP hardening.
# Firewall policy (rules, NAT) lives in the SmartConsole database and is NOT
# accessible from offline config exports.
#
set hostname gaia-gw01
set timezone US / Eastern
set edition default
#
# Password controls
set password-controls min-password-length 12
set password-controls complexity 2
set password-controls palindrome-check true
set password-controls history-checking true
set password-controls history-length 12
set password-controls password-expiration 90
#
# NTP
set ntp active on
add ntp server address 192.168.1.10 type server version 4
add ntp server address 192.168.1.11 type server version 4
#
# SSH — Telnet disabled (default off, do not set "set telnet enable")
set ssh enable
#
# Interfaces
set interface eth0 state on
set interface eth0 ipv4-address 10.0.0.1 mask-length 24
set interface eth0 comments "External (WAN)"
set interface eth1 state on
set interface eth1 ipv4-address 192.168.1.1 mask-length 24
set interface eth1 comments "Internal (LAN)"
#
# Default route
set static-route default nexthop gateway address 10.0.0.254 on
#
# Management access restriction (allowed-clients)
add allowed-client host 192.168.1.100
add allowed-client host 192.168.1.101
#
# SNMP — SNMPv3 only, non-default community
set snmp agent on
set snmp agent-version v3-Only
set snmp community SecureMonitor@2026 read-only
#
# User accounts
add user admin uid 0
set user admin shell /bin/bash
set user admin real-name "Admin User"
add user netops uid 101
set user netops shell /etc/cli.sh
set user netops real-name "Network Operations"
#
# CoreXL (multi-core) — informational
set core-xl-hash-tables on
