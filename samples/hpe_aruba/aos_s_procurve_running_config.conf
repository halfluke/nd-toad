; J9727A Configuration Editor; Created on release #WB.16.10.0014
; Ver #14:7f.1f.f8.1b.ff.7c.ff.fc.ff.ff.3f.ef:9f
; Exported via: show running-config from ProCurve/AOS-S manager

Running configuration:

hostname "PROCURVE-CORE-01"

; Timezone UTC-5 (EST)
time timezone -300
time ntp-utc
sntp server priority 1 10.0.0.1 version 3
sntp server priority 2 10.0.0.2 version 3

; Generate SSH host key (enables SSH v2)
crypto key generate ssh rsa bits 2048
ip ssh version 2

; Management access — restrict to management subnets only
ip authorized-managers 10.0.0.0 255.255.255.0 access manager
ip authorized-managers 10.1.0.0 255.255.255.0 access operator

; Telnet explicitly disabled (ProCurve default is ON; disable for CIS L1 compliance)
no telnet-server

; AAA — authenticate via TACACS+, fall back to local (telnet removed from allowed methods)
aaa authentication login privilege-mode
aaa authentication console login tacplus local
aaa authentication ssh login tacplus local

tacacs-server host 10.0.0.100 key "TacacsKey123" time-out 5
tacacs-server host 10.0.0.101 key "TacacsKey123" time-out 5

; Disable plaintext HTTP management (allow HTTPS only)
no web-management plaintext

; Login banner
banner motd "AUTHORIZED ACCESS ONLY - UNAUTHORIZED ACCESS IS STRICTLY PROHIBITED AND MONITORED"

; SNMP — non-default community strings, operator and manager access
snmp-server community "xQ9Lm3r" operator
snmp-server community "yR8Pm4s" manager restricted

; Syslog — send to two remote collectors
logging 10.0.1.100
logging 10.0.1.101

; VLANs
vlan 1
vlan 10
  name "Management"
vlan 20
  name "Servers"
vlan 30
  name "Clients"

; Trunk uplinks
interface A1
  name "Uplink-to-Core"
  trunk A1-A2 Trk1 LACP

; Management VLAN SVI
vlan 10 ip address 10.10.10.1 255.255.255.0

; Default gateway
ip default-gateway 10.10.10.254

; Spanning tree
spanning-tree
spanning-tree 1 priority 4096

end
