Current configuration:
!
!Version ArubaOS-CX FL.10.14.0001AV
!export-password: default
hostname CX-DIST-01
!
! ---------------------------------------------------------------
! Local user — password stored as ciphertext hash
! ---------------------------------------------------------------
user admin group administrators password ciphertext AQBapczR2OzhRyRPu/LhfQ3T0uWUJTDQHWkP3R9VYo3g9UbJYwAAAPAuwjkx+ONM6==
!
! ---------------------------------------------------------------
! Login banner
! ---------------------------------------------------------------
banner motd "AUTHORIZED ACCESS ONLY. Unauthorized access is prohibited and subject to legal action."
!
! ---------------------------------------------------------------
! AAA — authenticate via TACACS+, fall back to LOCAL
! ---------------------------------------------------------------
aaa authentication login default group tacacs local
aaa authorization commands default group tacacs local
aaa accounting all-mgmt ssh default
!
tacacs-server host 10.0.1.100 vrf mgmt key plaintext TacacsKey123
tacacs-server host 10.0.1.101 vrf mgmt key plaintext TacacsKey123
tacacs-server timeout 5
!
! ---------------------------------------------------------------
! NTP — bound to management VRF
! ---------------------------------------------------------------
ntp server 10.0.1.1 prefer
ntp server 10.0.1.2
ntp enable
ntp vrf mgmt
!
! ---------------------------------------------------------------
! SSH — enabled only on management VRF; Telnet disabled
! ---------------------------------------------------------------
ssh server vrf mgmt
no telnet-server
!
! ---------------------------------------------------------------
! HTTPS management — enabled only on management VRF
! ---------------------------------------------------------------
https-server vrf mgmt
!
! ---------------------------------------------------------------
! SNMP — community "public" is a default string (security finding)
! ---------------------------------------------------------------
snmp-server community public
snmp-server vrf mgmt
!
! ---------------------------------------------------------------
! Syslog
! ---------------------------------------------------------------
logging 10.0.1.200
logging 10.0.1.201
!
! ---------------------------------------------------------------
! VLANs
! ---------------------------------------------------------------
vlan 1
vlan 10
  name Management
vlan 20
  name Servers
vlan 30
  name Clients
!
! ---------------------------------------------------------------
! Interfaces — access ports
! ---------------------------------------------------------------
interface 1/1/1
  no shutdown
  vlan access 30
interface 1/1/2
  no shutdown
  vlan access 30
interface 1/1/3
  no shutdown
  vlan access 20
interface 1/1/4
  no shutdown
  vlan access 20
!
! ---------------------------------------------------------------
! Uplink LAG
! ---------------------------------------------------------------
interface lag 1
  no shutdown
  description Uplink-to-Core
  no routing
  vlan trunk native 1
  vlan trunk allowed 10,20,30
  lacp mode active
!
interface 1/1/47
  no shutdown
  lag 1
interface 1/1/48
  no shutdown
  lag 1
!
! ---------------------------------------------------------------
! VLAN L3 interfaces
! ---------------------------------------------------------------
interface vlan 10
  ip address 10.10.10.1/24
!
! ---------------------------------------------------------------
! Management interface — out-of-band dedicated port
! ---------------------------------------------------------------
interface mgmt
  no shutdown
  ip static 10.0.1.50/24
  default-gateway 10.0.1.1
!
! ---------------------------------------------------------------
! IP routing
! ---------------------------------------------------------------
ip route 0.0.0.0/0 10.10.10.254
!
