## Last changed: 2023-05-25 03:19:03 UTC
version 23.1R1.8;
groups {
    global {
        system {
            name-server {
                8.8.8.8;
            }
        }
    }
}
system {
    host-name stapleton;
    root-authentication {
        encrypted-password ""; ## SECRET-DATA
    }
    login {
        user bob {
            uid 2001;
            class super-user;
            authentication {
                encrypted-password ""; ## SECRET-DATA
            }
        }
    }
    services {
        ssh {
            root-login allow;
        }
        netconf {
            ssh;
        }
        dhcp-local-server {
            group jdhcp-group {
                interface irb.0;
            }
        }
        web-management {
            management-url admin;
            https {
                pki-local-certificate FOO;
            }
        }
    }
    time-zone UTC;
    name-server {
        8.8.8.8;
        8.8.4.4;
    }
    syslog {
        archive size 100k files 3;
        user * {
            any emergency;
        }
        file interactive-commands {
            interactive-commands any;
        }
        file messages {
            any notice;
            authorization info;
        }
    }
    max-configurations-on-flash 5;
    max-configuration-rollbacks 5;
    license {
        autoupdate {
            url https://ae1.juniper.net/junos/key_retrieval;
        }
    }
    ntp {
        server 129.6.15.28 prefer;
        server 129.6.15.29 prefer;
        server 168.235.69.132 prefer;
        server 45.63.54.13 prefer;
    }
    phone-home {
        server https://redirect.juniper.net;
        rfc-compliant;
    }
}
services {
    ssl {
        termination {
            profile SSL-Term {
                server-certificate FOO;
            }
        }
    }
}
security {
    address-book {
        global {
            address willie-public 192.168.0.40/32;
            address willie-private 192.168.1.40/32;
            address Servers 192.168.1.0/24;
        }
    }
    screen {
        ids-option untrust-screen {
            icmp {
                ping-death;
            }
            ip {
                source-route-option;
                tear-drop;
            }
            tcp {
                syn-flood {
                    alarm-threshold 1024;
                    attack-threshold 200;
                    source-threshold 1024;
                    destination-threshold 2048;
                    timeout 20;
                }
                land;
            }
        }
    }
    nat {
        source {
            rule-set trust-to-untrust {
                from zone trust;
                to zone untrust;
                rule source-nat-rule {
                    match {
                        source-address 0.0.0.0/0;
                    }
                    then {
                        source-nat {
                            interface;
                        }
                    }
                }
            }
        }
        static {
            rule-set admin-forwards {
                from zone untrust;
                rule p1 {
                    match {
                        destination-address 192.168.0.40/32;
                    }
                    then {
                        static-nat {
                            prefix {
                                192.168.1.40/32;
                            }
                        }
                    }
                }
                rule p2 {
                    match {
                        destination-address 192.168.0.41/32;
                    }
                    then {
                        static-nat {
                            prefix {
                                192.168.1.41/32;
                            }
                        }
                    }
                }
                rule p3 {
                    match {
                        destination-address 192.168.0.42/32;
                    }
                    then {
                        static-nat {
                            prefix {
                                192.168.1.42/32;
                            }
                        }
                    }
                }
                rule p4 {
                    match {
                        destination-address 192.168.0.43/32;
                    }
                    then {
                        static-nat {
                            prefix {
                                192.168.1.43/32;
                            }
                        }
                    }
                }
                rule p5 {
                    match {
                        destination-address 192.168.0.44/32;
                    }
                    then {
                        static-nat {
                            prefix {
                                192.168.1.44/32;
                            }
                        }
                    }
                }
                rule p6 {
                    match {
                        destination-address 192.168.0.45/32;
                    }
                    then {
                        static-nat {
                            prefix {
                                192.168.1.45/32;
                            }
                        }
                    }
                }
            }
        }
        proxy-arp {
            interface ge-0/0/0.0 {
                address {
                    192.168.0.46/32;
                    192.168.0.40/32;
                    192.168.0.41/32;
                    192.168.0.42/32;
                    192.168.0.43/32;
                    192.168.0.44/32;
                    192.168.0.45/32;
                }
            }
        }
    }
    policies {
        from-zone trust to-zone trust {
            policy trust-to-trust {
                match {
                    source-address any;
                    destination-address any;
                    application any;
                }
                then {
                    permit;
                }
            }
        }
        from-zone trust to-zone untrust {
            policy trust-to-untrust {
                match {
                    source-address any;
                    destination-address any;
                    application any;
                }
                then {
                    permit;
                }
            }
        }
        from-zone untrust to-zone trust {
            policy p1 {
                match {
                    source-address any;
                    destination-address any;
                    application [ junos-http junos-ssh ];
                }
                then {
                    permit;
                }
            }
        }
    }
    zones {
        security-zone trust {
            host-inbound-traffic {
                system-services {
                    all;
                }
                protocols {
                    all;
                }
            }
            interfaces {
                irb.0;
            }
        }
        security-zone untrust {
            screen untrust-screen;
            host-inbound-traffic {
                system-services {
                    all;
                }
                protocols {
                    all;
                }
            }
            interfaces {
                ge-0/0/0.0 {
                    host-inbound-traffic {
                        system-services {
                            dhcp;
                            tftp;
                            https;
                            ssh;
                        }
                    }
                }
                ge-0/0/7.0 {
                    host-inbound-traffic {
                        system-services {
                            dhcp;
                            tftp;
                        }
                    }
                }
            }
        }
        security-zone vpn {
            interfaces {
                st0.0;
            }
        }
        security-zone ServerZone;
    }
}
interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 192.168.0.70/24;
            }
        }
    }
    ge-0/0/1 {
        unit 0 {
            family ethernet-switching {
                vlan {
                    members vlan-trust;
                }
            }
        }
    }
    ge-0/0/2 {
        unit 0 {
            family ethernet-switching {
                vlan {
                    members vlan-trust;
                }
            }
        }
    }
    ge-0/0/3 {
        unit 0 {
            family ethernet-switching {
                vlan {
                    members vlan-trust;
                }
            }
        }
    }
    ge-0/0/4 {
        unit 0 {
            family ethernet-switching {
                vlan {
                    members vlan-trust;
                }
            }
        }
    }
    ge-0/0/5 {
        unit 0 {
            family ethernet-switching {
                vlan {
                    members vlan-trust;
                }
            }
        }
    }
    ge-0/0/6 {
        unit 0 {
            family ethernet-switching {
                vlan {
                    members vlan-trust;
                }
            }
        }
    }
    ge-0/0/7 {
        unit 0 {
            family inet {
                dhcp {
                    vendor-id Juniper-srx300;
                }
            }
        }
    }
    irb {
        unit 0 {
            family inet {
                address 192.168.1.1/24;
            }
        }
    }
    st0 {
        unit 0 {
            family inet;
        }
    }
}
access {
    profile VPN-AP {
        client bob {
            firewall-user {
                password ""; ## SECRET-DATA
            }
        }
        address-assignment {
            pool junosDHCPPool;
        }
    }
    address-assignment {
        pool junosDHCPPool {
            family inet {
                network 192.168.1.0/24;
                range junosRange {
                    low 192.168.1.200;
                    high 192.168.1.250;
                }
                dhcp-attributes {
                    router {
                        192.168.1.1;
                    }
                    propagate-settings ge-0/0/0.0;
                }
                xauth-attributes {
                    primary-dns 8.8.8.8/32;
                }
            }
        }
    }
}
vlans {
    vlan-trust {
        vlan-id 3;
        l3-interface irb.0;
    }
}
protocols {
    l2-learning {
        global-mode switching;
    }
    rstp {
        interface all;
    }
}
routing-options {
    static {
        route 0.0.0.0/0 next-hop 192.168.0.1;
    }
}