# Arista EOS security checks — CIS Arista EOS Benchmark L1 mapping
profile: arista_eos

checks:

  - id: EOS-MGMT-001
    generic_id: MGMT-001
    title: "Telnet must not be enabled"
    severity: critical
    cis:
      - {benchmark: "CIS Arista EOS", control: "1.1.1", level: 1}
    probe:
      type: forbidden_regex
      # Arista EOS: Telnet is OFF by default. The 'management telnet' block with 'no shutdown'
      # inside enables it. A block that contains only 'shutdown' (explicit disable, for
      # documentation) is safe and must not be flagged.
      # The multiline (?ms) + non-greedy .*? matches the 'no shutdown' within the same block.
      pattern: '(?ms)^\s*management\s+telnet\b.*?no\s+shutdown'
    remediation: "Remove 'no shutdown' from the 'management telnet' block, or remove the block entirely."

  - id: EOS-MGMT-002
    generic_id: MGMT-003
    title: "SSH must be the only enabled management transport"
    severity: high
    cis:
      - {benchmark: "CIS Arista EOS", control: "1.1.2", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*management\s+ssh'
    remediation: "Configure a 'management ssh' block and restrict access by source IP."

  - id: EOS-MGMT-003
    generic_id: MGMT-002
    title: "Management API HTTP must use HTTPS only"
    severity: high
    cis:
      - {benchmark: "CIS Arista EOS", control: "1.1.3", level: 1}
    probe:
      type: forbidden_regex
      pattern: '(?m)^\s*protocol\s+http\b'
      scope: "(?m)^management api http-commands"
    remediation: "Under 'management api http-commands': no protocol http; use protocol https."

  - id: EOS-MGMT-004
    generic_id: MGMT-005
    title: "Management SSH idle-timeout must be configured"
    severity: medium
    cis:
      - {benchmark: "CIS Arista EOS", control: "1.2.1", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*idle-timeout\s+[1-9]'
      scope: "(?m)^management ssh"
    remediation: "Under 'management ssh': idle-timeout 10"

  - id: EOS-MGMT-005
    generic_id: AAA-002
    title: "Login banner must be configured"
    severity: low
    cis:
      - {benchmark: "CIS Arista EOS", control: "1.3.1", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*banner\s+(login|motd)\s+'
    remediation: "Configure: banner login EOF <legal notice> EOF"

  - id: EOS-AAA-001
    generic_id: AAA-001
    title: "AAA authentication must be configured"
    severity: critical
    cis:
      - {benchmark: "CIS Arista EOS", control: "2.1.1", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*aaa\s+authentication\s+login\s+'
    remediation: "Configure: aaa authentication login default group radius local"

  - id: EOS-AUTH-001
    generic_id: AUTH-001
    title: "All local users must have strong role-based configuration"
    severity: high
    cis:
      - {benchmark: "CIS Arista EOS", control: "2.2.1", level: 1}
    probe:
      type: forbidden_regex
      pattern: '(?m)^\s*username\s+\S+\s+nopassword'
    remediation: "Remove 'nopassword' from all username entries; require password or certificate."

  - id: EOS-SNMP-001
    generic_id: SNMP-001
    title: "Default SNMP community strings must not be used"
    severity: critical
    cis:
      - {benchmark: "CIS Arista EOS", control: "3.1.1", level: 1}
    probe:
      type: forbidden_regex
      pattern: '(?m)^\s*snmp-server\s+community\s+(public|private)\b'
    remediation: "Change SNMP community strings from default values."

  - id: EOS-LOG-001
    generic_id: LOG-001
    title: "Remote syslog must be configured"
    severity: high
    cis:
      - {benchmark: "CIS Arista EOS", control: "4.1.1", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*logging\s+host\s+'
    remediation: "Configure: logging host <syslog-ip>"

  - id: EOS-TIME-001
    generic_id: TIME-001
    title: "NTP must be configured"
    severity: medium
    cis:
      - {benchmark: "CIS Arista EOS", control: "5.1.1", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*ntp\s+server\s+'
    remediation: "Configure: ntp server <ip> vrf management"

  - id: EOS-POLICY-001
    generic_id: POLICY-001
    title: "Permit any-any ACL entries must not exist"
    severity: critical
    cis:
      - {benchmark: "CIS Arista EOS", control: "6.1.1", level: 1}
    probe:
      type: forbidden_regex
      pattern: '(?m)^\s*permit\s+ip\s+any\s+any'
    remediation: "Replace any-any permit rules with least-privilege entries."

  - id: EOS-COPP-001
    generic_id: POLICY-002
    title: "Control Plane Policing (CoPP) must be configured"
    description: "CoPP limits management traffic rates to prevent resource exhaustion."
    severity: high
    cis:
      - {benchmark: "CIS Arista EOS", control: "6.2.1", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*policy-map\s+type\s+control-plane'
    remediation: "Configure a CoPP policy-map and apply it to: control-plane  service-policy input <name>"
