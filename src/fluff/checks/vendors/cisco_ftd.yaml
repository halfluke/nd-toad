# Cisco FTD / Firepower security checks
# Covers FDM-managed devices (ASA-shaped CLI) and notes FMC-only controls as manual.
vendor: cisco
profile: cisco_ftd

checks:

  - id: FTD-MGMT-001
    generic_id: MGMT-001
    title: "Telnet must not be used for management"
    severity: critical
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "1.1.1", level: 1}
    probe:
      type: forbidden_regex
      pattern: '(?m)^\s*telnet\s+\d'
    remediation: "Remove all telnet management statements. Use SSH or HTTPS only."

  - id: FTD-MGMT-002
    generic_id: MGMT-003
    title: "SSH version 2 must be configured"
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "1.1.2", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*ssh\s+version\s+2'
    remediation: "Configure: ssh version 2"

  - id: FTD-MGMT-003
    generic_id: MGMT-002
    title: "HTTPS management must not permit unrestricted source access"
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "1.1.3", level: 1}
    probe:
      type: forbidden_regex
      # 'http server enable' is required for FDM/ASDM — the real risk is unrestricted
      # access via 'http 0.0.0.0 0.0.0.0 <iface>'. Restricted subnet ACLs are acceptable.
      pattern: '(?m)^\s*http\s+0\.0\.0\.0\s+0\.0\.0\.0\s+\S+'
    remediation: "Replace 'http 0.0.0.0 0.0.0.0 <iface>' with a specific management subnet: 'http <mgmt-net> <mask> <iface>'"

  - id: FTD-AAA-001
    generic_id: AAA-001
    title: "AAA authentication must be configured for SSH access"
    severity: critical
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "2.1.1", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*aaa\s+authentication\s+ssh\s+console'
    remediation: "Configure: aaa authentication ssh console LOCAL"

  - id: FTD-SNMP-001
    generic_id: SNMP-001
    title: "Default SNMP community strings must not be used"
    severity: critical
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "3.1.1", level: 1}
    probe:
      type: forbidden_regex
      pattern: '(?m)^\s*snmp-server\s+community\s+(public|private)\b'
    remediation: "Replace default SNMP community strings."

  - id: FTD-LOG-001
    generic_id: LOG-001
    title: "Logging must be enabled"
    severity: medium
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "4.1.1", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*logging\s+enable'
    remediation: "Configure: logging enable"

  - id: FTD-LOG-002
    generic_id: LOG-002
    title: "Remote syslog must be configured"
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "4.1.2", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*logging\s+host\s+'
    remediation: "Configure: logging host <iface> <syslog-ip>"

  - id: FTD-POLICY-001
    generic_id: POLICY-001
    title: "Permit any-any rules must not exist in access policy"
    severity: critical
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "5.1.1", level: 1}
    probe:
      type: forbidden_regex
      # FTD LINA format uses 'any4' instead of 'any'; pattern covers both
      pattern: '(?m)\bpermit\s+(ip|tcp|udp)\s+any4?\s+any4?\b'
    remediation: "Remove any-any permit rules from access control policies."

  - id: FTD-FMC-001
    generic_id: POLICY-003
    title: "Intrusion Prevention System (IPS) policy must be enabled on all rules"
    description: "FMC-only: verify IPS inspection is bound to the access control policy. Cannot be verified from CLI config alone."
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "5.2.1", level: 1}
    probe:
      type: manual
      reason: "FMC integration requires checking FMC GUI or API — not present in LINA running config."
    remediation: "In FMC: Access Control Policy → verify IPS policy is set on each allow rule."

  - id: FTD-FMC-002
    generic_id: POLICY-004
    title: "File inspection policy must be enabled"
    description: "FMC-only: requires manual verification of file/malware inspection binding."
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "5.3.1", level: 1}
    probe:
      type: manual
      reason: "IPS policy assignment requires review in FMC — cannot be confirmed from LINA config."
    remediation: "In FMC: Access Control Policy → File Policy must be assigned to applicable rules."

  - id: FTD-TIME-001
    generic_id: TIME-001
    title: "NTP must be configured"
    severity: medium
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "6.1.1", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*ntp\s+server\s+'
    remediation: "Configure: ntp server <ip>"

  # ── Additional CIS Firepower L1 controls ─────────────────────────────────

  - id: FTD-MGMT-004
    generic_id: MGMT-004
    title: "SSH timeout must be configured"
    severity: medium
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "1.1.4", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*ssh\s+timeout\s+[0-9]+'
    remediation: "Configure: ssh timeout 60"

  - id: FTD-MGMT-005
    generic_id: MGMT-005
    title: "Login banner must be configured"
    severity: low
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "1.2.1", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*banner\s+(login|motd|exec)\s+'
    remediation: "Configure: banner login <legal notice>"

  - id: FTD-MGMT-006
    generic_id: MGMT-006
    title: "Console timeout must be configured"
    severity: medium
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "1.2.2", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*console\s+timeout\s+[1-9]'
    remediation: "Configure: console timeout 10"

  - id: FTD-MGMT-007
    generic_id: MGMT-007
    title: "SSH access must be restricted to management subnet"
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "1.1.5", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*ssh\s+\d{1,3}\.\d{1,3}'
    remediation: "Configure: ssh <mgmt-net> <mask> <management-interface>"

  - id: FTD-AAA-002
    generic_id: AAA-002
    title: "AAA authentication must be configured for enable mode"
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "2.1.2", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*aaa\s+authentication\s+enable\s+console'
    remediation: "Configure: aaa authentication enable console LOCAL"

  - id: FTD-AAA-003
    generic_id: AAA-003
    title: "AAA authorization must be configured"
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "2.1.3", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*aaa\s+authorization\s+(exec|command)\s+'
    remediation: "Configure: aaa authorization exec authentication-server"

  - id: FTD-AAA-004
    generic_id: AAA-004
    title: "TACACS+ or RADIUS server must be configured"
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "2.1.4", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*aaa-server\s+\S+\s+(protocol\s+(tacacs\+?|radius)|tacacs\+?|radius)'
    remediation: "Configure: aaa-server TACACS+ protocol tacacs+"

  - id: FTD-AUTH-001
    generic_id: AUTH-001
    title: "Enable secret must use strong hashing"
    severity: critical
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "2.2.1", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*enable\s+(password|secret)\s+'
    remediation: "Configure: enable password <strong-value>"

  - id: FTD-AUTH-002
    generic_id: AUTH-002
    title: "Service password-encryption must be enabled"
    severity: medium
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "2.2.2", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*service\s+password-encryption'
    remediation: "Configure: service password-encryption"

  - id: FTD-SNMP-002
    generic_id: SNMP-002
    title: "SNMP must be restricted to management hosts"
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "3.1.2", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*snmp-server\s+host\s+'
    remediation: "Configure: snmp-server host <iface> <mgmt-ip>"

  - id: FTD-SNMP-003
    generic_id: SNMP-003
    title: "SNMPv3 group must be configured"
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "3.1.3", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*snmp-server\s+group\s+\S+\s+v3\s+(auth|priv)'
    remediation: "Configure: snmp-server group SNMPV3 v3 priv"

  - id: FTD-LOG-003
    generic_id: LOG-003
    title: "Logging trap severity must be configured"
    severity: medium
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "4.1.3", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*logging\s+trap\s+(warnings|informational|notifications)'
    remediation: "Configure: logging trap warnings"

  - id: FTD-LOG-004
    generic_id: LOG-004
    title: "Log timestamps must be configured"
    severity: low
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "4.1.4", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*logging\s+timestamp'
    remediation: "Configure: logging timestamp"

  - id: FTD-TIME-002
    generic_id: TIME-002
    title: "NTP authentication must be configured"
    severity: medium
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "6.1.2", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*ntp\s+authenticate'
    remediation: "Configure: ntp authenticate; ntp authentication-key <id> md5 <key>; ntp trusted-key <id>"

  - id: FTD-POLICY-003
    generic_id: POLICY-003
    title: "Failover link encryption must be configured if HA deployed"
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "5.4.1", level: 1}
    probe:
      type: manual_fp_risk
      reason: "HA deployment is topology-dependent. Cannot determine if failover is in use without context."
    remediation: "If failover is configured: failover key <key>"

  - id: FTD-POLICY-004
    generic_id: POLICY-004
    title: "ICMP must be restricted (no blanket permit icmp any any)"
    severity: medium
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "5.1.2", level: 1}
    probe:
      type: forbidden_regex
      pattern: '(?m)^\s*access-list\s+\S+\s+permit\s+icmp\s+any\s+any\b'
    remediation: "Restrict ICMP to required types and source/destination pairs."

  - id: FTD-TIME-003
    generic_id: TIME-003
    title: "NTP trusted-key must be configured"
    severity: medium
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "6.1.3", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*ntp\s+trusted-key\s+'
    remediation: "Configure: ntp trusted-key <key-id>"

  - id: FTD-AUTH-003
    generic_id: AUTH-003
    title: "Usernames must use secret not password"
    severity: high
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "2.2.3", level: 1}
    probe:
      type: forbidden_regex
      pattern: '(?m)^\s*username\s+\S+\s+password\s+'
    remediation: "Replace all 'username X password' with 'username X secret'"

  - id: FTD-MGMT-008
    generic_id: MGMT-008
    title: "SSH max authentication retries must be configured"
    severity: medium
    cis:
      - {benchmark: "CIS Cisco Firepower", control: "1.1.6", level: 1}
    probe:
      type: required_regex
      pattern: '(?m)^\s*ssh\s+authentication-retries\s+[1-5]\b'
    remediation: "Configure: ssh authentication-retries 3"
