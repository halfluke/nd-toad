firmware-version SonicOS Enhanced 7.0.1-5095-R2749
management https
management ssh
no management http
no management telnet
management idle-timeout 10
syslog server 10.1.1.100
ntp server 10.0.0.1
address-object ipv4 MGMT-NET network 10.0.0.0/24 zone LAN
address-object ipv4 ANY host 0.0.0.0 zone WAN
service-object TCP HTTPS 443 443
access-rule from LAN to WAN action allow service HTTPS source MGMT-NET destination ANY
access-rule from WAN to LAN action deny source ANY destination ANY log
