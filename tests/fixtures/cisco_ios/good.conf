! Cisco IOS 17 — GOOD (all automated checks should pass)
version 17.6
service timestamps log datetime msec localtime show-timezone
service timestamps debug datetime msec localtime show-timezone
service password-encryption
no service tcp-small-servers
no service udp-small-servers
no service pad
hostname CORE-RTR-01
ip domain-name example.internal
!
security passwords min-length 14
!
enable secret 9 $9$CgEHNOVh5qxMXU$xyz1234abcdef
!
aaa new-model
aaa authentication login default group radius local
aaa authentication enable default enable
aaa authorization exec default group radius local
!
login block-for 300 attempts 5 within 120
!
username auditor privilege 15 secret 9 $9$abc123
!
no ip bootp server
no ip source-route
no ip finger
no ip http server
ip http access-class 10
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
!
no lldp run
!
banner login ^C
AUTHORIZED ACCESS ONLY. Unauthorized access is prohibited and monitored.
^C
!
interface GigabitEthernet0/0/0
 description WAN
 no ip proxy-arp
!
interface Loopback0
 description Mgmt
!
ip access-list standard MGMT-HOSTS
 permit 10.0.0.0 0.0.0.255
 deny   any log
!
ntp authenticate
ntp authentication-key 1 md5 SuperSecretKey
ntp trusted-key 1
ntp server 10.0.0.1
ntp server 10.0.0.2
!
snmp-server group SNMPV3GROUP v3 priv
snmp-server community xK9pLq8r RO 99
snmp-server host 10.1.1.1 version 3 priv SNMPV3USER
snmp-server host 10.1.1.1 traps xK9pLq8r
!
ip access-list standard ACL-SNMP
 permit 10.1.0.0 0.0.0.255
 deny   any
!
logging on
logging buffered 65536
logging host 10.1.1.100
logging trap warnings
logging source-interface Loopback0
!
no cdp run
!
line con 0
 exec-timeout 5 0
 login local
line vty 0 4
 access-class MGMT-HOSTS in
 exec-timeout 10 0
 transport input ssh
line vty 5 15
 access-class MGMT-HOSTS in
 exec-timeout 10 0
 transport input ssh
!
end
