! Cisco IOS — BAD: permit ip any any in ACL
version 17.3
service timestamps log datetime msec
service password-encryption
hostname PERMSIVE-RTR-01
!
enable secret 9 $9$abc123
aaa new-model
aaa authentication login default local
!
ip ssh version 2
no ip http server
no cdp run
no ip source-route
!
ip access-list extended OPEN-POLICY
 permit ip any any
!
logging on
logging host 10.1.1.100
ntp server 10.0.0.1
!
snmp-server community zXq2Rk7m RO 99
!
banner login ^C AUTHORIZED ONLY ^C
!
security passwords min-length 14
!
line con 0
 exec-timeout 5 0
line vty 0 4
 access-class 10 in
 exec-timeout 10 0
 transport input ssh
!
ip access-list standard 10
 permit 10.0.0.0 0.0.0.255
!
end
