#TMSH-VERSION: 16.1.3
sys global-settings {
    hostname bigip-prod-01.corp.example.com
    mgmt-dhcp disabled
}
sys management-ip 10.0.1.50/24 {
    description Management-IP
}
sys management-route default {
    gateway 10.0.1.1
}
sys dns {
    name-servers { 10.0.1.53 }
    search { corp.example.com }
}
sys ntp {
    servers {
        10.0.1.30 {
            version 4
        }
    }
    timezone America/New_York
}
sys syslog {
    remote-servers {
        remotesyslog1 {
            host 10.0.1.20
            remote-port 514
        }
    }
}
sys sshd {
    inactivity-timeout 900
    allow { 10.0.1.0/24 }
    banner enabled
    banner-text "Authorized access only."
}
sys httpd {
    auth-pam-idle-timeout 900
    ssl-ciphersuite DEFAULT:!EXPORT:!RC4:!NULL:!3DES:!aNULL
    allow { 10.0.1.0/24 }
}
auth password-policy {
    min-length 14
    required-uppercase 1
    required-lowercase 1
    required-numeric 1
    required-special 1
    max-login-failures 5
}
auth tacacs TACACS-PROD {
    servers { 10.0.1.10 }
    secret MyTacacsSecret
}
auth source {
    type tacacs
    fallback enabled
}
auth user admin {
    description "Admin account"
    password crypt-sha512 $6$abcdefghijklmno...
    role administrator
    shell bash
}
auth user monitor-user {
    role manager
}
net vlan MGMT {
    interfaces {
        1.1 { }
    }
}
sys snmp {
    allowed-addresses { 10.0.1.0/24 }
    communities {
        monitoring {
            community-name Mon!Comm1
            access ro
        }
    }
    traps {
        trap1 {
            host 10.0.1.20
            community Mon!Comm1
        }
    }
    v3-users {
        snmpv3user {
            auth-password MyAuthPass123!
            auth-protocol sha
            privacy-password MyPrivPass123!
            privacy-protocol aes
        }
    }
}
sys log-config publisher PROD-SYSLOG {
    destinations {
        remotesyslog1 { }
    }
}
sys log-config destination syslog PROD-SYSLOG-DEST {
    remote-syslog remotesyslog1
}
sys log-config destination management-port MGMT-LOG {
    ip-address 10.0.1.20
    port 514
}
ltm virtual VS-HTTPS {
    destination 10.10.0.1:443
    ip-protocol tcp
    profiles {
        tcp { context clientside }
        ssl-client-profile { context clientside }
    }
}
security firewall policy COMMON-POLICY {
    rules {
        deny-all {
            action drop
        }
    }
}
