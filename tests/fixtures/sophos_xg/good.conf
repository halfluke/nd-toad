<?xml version="1.0" encoding="UTF-8"?>
<Configuration APIVersion="2101.1" IPS="On">
  <AdminSettings>
    <HostName>XG-FW-01</HostName>
    <AdminPort>4444</AdminPort>
    <Telnet>Disable</Telnet>
    <HTTPS_Port>4444</HTTPS_Port>
    <SessionTimeout>10</SessionTimeout>
    <LoginSecurity>
      <MaxFailedLogins>5</MaxFailedLogins>
    </LoginSecurity>
  </AdminSettings>
  <SyslogServers>
    <SyslogServer>
      <IPAddress>10.1.1.100</IPAddress>
      <Port>514</Port>
      <Facility>LOCAL0</Facility>
    </SyslogServer>
  </SyslogServers>
  <Time>
    <NTPServerList>
      <NTPServer>10.0.0.1</NTPServer>
      <NTPServer>10.0.0.2</NTPServer>
    </NTPServerList>
  </Time>
  <FirewallRule>
    <Name>ALLOW-HTTPS-OUT</Name>
    <Status>Enable</Status>
    <Action>Accept</Action>
  </FirewallRule>
  <NetworkPolicy>
    <IntrusionPrevention>
      <Status>Enable</Status>
    </IntrusionPrevention>
  </NetworkPolicy>
  <IPHost>
    <Name>MGMT-NET</Name>
    <IPFamily>IPv4</IPFamily>
    <HostType>Network</HostType>
    <IPAddress>10.0.0.0</IPAddress>
    <Subnet>255.255.255.0</Subnet>
  </IPHost>
  <SNMPAgent>
    <Status>Disable</Status>
  </SNMPAgent>
</Configuration>
