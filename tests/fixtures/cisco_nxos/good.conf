!Command: show running-config
!Time: Thu May 28 2026

Cisco Nexus Operating System (NX-OS) Software
version 10.2(4)

hostname NX-SWITCH-01

feature ssh
feature scp-server
no feature telnet
no feature http-server

vlan 10
  name DATA
vlan 20
  name MGMT

vpc domain 10
  peer-keepalive destination 10.0.0.2

interface Ethernet1/1
  description UPLINK
  switchport mode trunk
interface mgmt0
  ip address 10.0.0.1/24

banner motd @
AUTHORIZED ACCESS ONLY.
@

aaa authentication login default group tacacs+ local

username nxosadmin password 5 $5$xyz123abc role network-admin

password strength-check

snmp-server user snmpv3user network-admin v3 auth sha AuthPass123! priv aes-128 PrivPass456!

logging server 10.1.1.100 6 use-vrf management
logging timestamp milliseconds

ntp server 10.0.0.1 use-vrf management
ntp server 10.0.0.2 use-vrf management

line vty
  exec-timeout 10

end
