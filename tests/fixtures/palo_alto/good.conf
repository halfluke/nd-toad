<?xml version="1.0"?>
<config version="11.0.0" urldb="paloaltonetworks">
  <devices>
    <entry name="localhost.localdomain">
      <deviceconfig>
        <system>
          <hostname>PAN-FW-01</hostname>
          <idle-timeout>10</idle-timeout>
          <motd>AUTHORIZED ACCESS ONLY. Unauthorized use prohibited.</motd>
        </system>
        <management>
          <permitted-ip>
            <entry name="mgmt-hosts"><ip-netmask>10.0.0.0/24</ip-netmask></entry>
          </permitted-ip>
        </management>
      </deviceconfig>
      <vsys>
        <entry name="vsys1">
          <rulebase>
            <security>
              <rules>
                <entry name="Allow-Internal">
                  <source><member>10.10.0.0/16</member></source>
                  <destination><member>10.20.0.0/16</member></destination>
                  <action>allow</action>
                  <profile-setting><profiles><ips><member>strict</member></ips></profiles></profile-setting>
                </entry>
              </rules>
            </security>
          </rulebase>
        </entry>
      </vsys>
    </entry>
  </devices>
  <authentication-profile>
    <entry name="Radius-Auth">
      <method><radius><server-profile>corp-radius</server-profile></radius></method>
    </entry>
  </authentication-profile>
  <password-profile>
    <entry name="Strong-PW">
      <minimum-length>14</minimum-length>
      <minimum-uppercase-letters>1</minimum-uppercase-letters>
    </entry>
  </password-profile>
  <server-profiles>
    <syslog>
      <entry name="corp-syslog">
        <server><entry name="siem"><server>10.1.1.100</server></entry></server>
      </entry>
    </syslog>
  </server-profiles>
  <ntp-servers>
    <primary-ntp-server><ntp-server-address>10.0.0.1</ntp-server-address></primary-ntp-server>
  </ntp-servers>
  <snmp-setting>
    <v3>
      <users>
        <entry name="snmpv3user">
          <authpwd>StrongAuthKey!</authpwd>
          <privpwd>StrongPrivKey!</privpwd>
        </entry>
      </users>
    </v3>
  </snmp-setting>
</config>
