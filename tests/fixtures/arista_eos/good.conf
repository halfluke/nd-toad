! device: EOS-SWITCH-01, cEOSLab, EOS-4.30.1F
! image version: 4.30.1F-12345678.4301F (engineering build)
!
hostname EOS-SWITCH-01
!
aaa authentication login default group radius local
!
management ssh
   idle-timeout 10
   authentication mode keyboard-interactive
!
management api http-commands
   protocol https
   no shutdown
!
banner login
AUTHORIZED ACCESS ONLY. Unauthorized access is prohibited.
EOF
!
username netadmin privilege 15 role network-admin secret sha512 $6$abcdef
!
snmp-server community xR7pKn2m ro
!
logging host 10.1.1.100
logging format timestamp high-resolution
!
ntp server 10.0.0.1 vrf management
!
ip access-list MGMT-ACL
   10 permit ip 10.0.0.0/24 any
   20 deny ip any any log
!
control-plane
   service-policy input CPP-POLICY
!
policy-map type control-plane CPP-POLICY
   class copp-system-p-class-critical
      police rate 1000 pps
!
end
