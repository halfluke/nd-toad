#conf_file_ver=2200000002
#config-version=FGVM64-7.4.1-FW-build2463-230830:opmode=1:vdom=0
config system global
    set admin-telnet disable
    set admin-ssh-v1 disable
    set admintimeout 10
    set hostname "FW-FORTI-01"
    set pre-login-banner enable
    set post-login-banner enable
    set admin-sport 8443
end
config system password-policy
    set status enable
    set min-length 14
    set must-contain upper-case-letter lower-case-letter number non-alphanumeric
end
config system ntp
    set type custom
    set ntpserver "10.0.0.1"
    set syncinterval 60
end
config log syslogd setting
    set status enable
    set server "10.1.1.100"
    set severity information
end
config system snmp community
    edit 1
        set name "xPq9Lm3r"
        set status enable
    next
end
config firewall policy
    edit 1
        set name "LAN-to-Internet"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "LAN_NET"
        set dstaddr "Internet"
        set action accept
        set ips-sensor "default"
    next
end
