# Configuration of CP-GW-01
# Language version: 1.0

set hostname CP-GW-01
set timezone "Europe/London"
set ssh enable
set telnet disable
set ntp server primary 10.0.0.1
set ntp active on
set mgmt-gui-clients network 10.0.0.0 mask-length 24
set user admin password-expires 90
set snmp community xQ9Lm3r read-only
