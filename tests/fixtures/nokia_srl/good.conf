{
  "srl_nokia": {
    "system": {
      "name": {
        "host-name": "SRL-NODE-01"
      },
      "ssh-server": {
        "admin-state": "enable",
        "timeout": 600
      },
      "ntp": {
        "admin-state": "enable",
        "server": [{"address": "10.0.0.1"}]
      },
      "logging": {
        "remote-server": [
          {"host": "10.1.1.100", "transport": "udp", "remote-port": 514}
        ]
      },
      "snmp": {
        "version": "v3",
        "community": []
      },
      "aaa": {
        "authentication": {
          "admin-user": {"admin-state": "enable"},
          "linuxadmin-user": {"admin-state": "disable"}
        },
        "server-group": [
          {"name": "corp-radius", "type": "radius"}
        ]
      }
    }
  },
  "srl_nokia-network-instance:network-instance": [
    {
      "name": "default",
      "type": "srl_nokia-network-instance-types:default",
      "interface": [
        {"name": "ethernet-1/1.0"}
      ]
    }
  ],
  "srl_nokia-interfaces:interface": [
    {
      "name": "ethernet-1/1",
      "admin-state": "enable",
      "subinterface": [
        {
          "index": 0,
          "admin-state": "enable",
          "ipv4": {"address": [{"ip-prefix": "10.0.0.1/24"}]}
        }
      ]
    }
  ],
  "srl_nokia-routing-policy:routing-policy": {
    "policy": [
      {"name": "ACCEPT-ALL", "statement": [{"sequence-id": 10, "action": {"policy-result": "accept"}}]}
    ]
  },
  "srl_nokia-acl:acl": {
    "ipv4-filter": [
      {"name": "MGMT-FILTER", "entry": [{"sequence-id": 10, "action": {"accept": {}}}]}
    ]
  }
}
